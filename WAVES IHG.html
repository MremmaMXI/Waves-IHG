<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Iberostar Waves - Mar & Beach</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --fondo-azul: #ae600c;
            --btn-dorado: #e69138;
            --header-bg: #e69138;
            --btn-borrar: #ffdfc3;
            --blanco: #ffffff;
            --gris-suave: #f0f2f5;
            --texto-oscuro: #4e2c08;
            --drag-box: #ffe5cb;
        }

        .bg-slider {
            position: fixed;
            inset: 0;
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
        }
        .bg-slide {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 1000ms ease;
            will-change: opacity, transform;
            transform-origin: center center;
            animation: ken 15s ease-in infinite alternate;
        }
        .bg-slide.active { opacity: 1; }
        @keyframes ken { from { transform: scale(1.25); } to { transform: scale(1.08); } }

        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f2a3a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            background: linear-gradient(to bottom, var(--header-bg) 135px, white 135px);
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            width: 500px;
            max-width: 95vw;
            text-align: center;
            overflow: hidden;
            padding: 0;
            z-index: 2;
            position: relative;
        }

        #header-no-drag {
            padding: 20px;
            height: 135px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        .logo-estrella { width: 50px; margin-bottom: 5px; filter: brightness(0) invert(1); transform-origin: center center; animation: spinGrow 700ms cubic-bezier(.2,.8,.2,1) forwards; will-change: transform; }
        .logo-estrella:hover { animation: hoverSpin 300ms linear; }
        @keyframes spinGrow { from { transform: scale(0.3) rotate(-90deg); } to { transform: scale(1) rotate(0deg); } }
        @keyframes hoverSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        h2 { color: white; margin: 0; font-weight: 400; letter-spacing: 2px; font-size: 18px; }
        .subtitle { font-size: 14.5px; color: rgba(255,255,255,0.95); margin-top: 2px; }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 130px;
            gap: 14px;
            padding: 12px 20px 22px 20px;
            align-items: stretch;
        }

        #reordenar-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sort-item {
            padding: 10px 12px;
            margin-bottom: 0;
            border: 1px solid transparent;
            border-radius: 10px;
            cursor: grab;
            transition: background 0.18s, border 0.18s;
            position: relative;
            background: white;
            font-size: 14px;
            text-align: left;
            padding-top: 20px;
        }
        .sort-item:hover {
            background: #fdfdfd;
            border: 1.5px dashed #ccc;
            transform: translateY(-2.5px);
            filter: brightness(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.06);
        }
        .sort-item::before {
            content: "";
            position: absolute;
            top: 6px;
            right: 12px;
            width: 18px;
            height: 18px;
            background: var(--drag-box);
            border-radius: 6px;
            box-shadow: 0 1px 0 rgba(0,0,0,0.06);
            pointer-events: none;
            z-index: 3;
        }
        .sort-item::after {
            content: "";
            position: absolute;
            top: 10px;
            right: 15px;
            width: 8px;
            height: 2px;
            background: #c17f3b;
            box-shadow: 0 4px 0 #c17f3b, 0 8px 0 #c17f3b;
            border-radius: 1px;
            pointer-events: none;
            z-index: 4;
        }
        .sortable-ghost {
            opacity: 0.3;
            background: var(--btn-borrar) !important;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 6px;
            color: var(--texto-oscuro);
            font-size: 11px;
            text-transform: uppercase;
            text-align: left;
            letter-spacing: 0.06em;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            text-align: center;
            outline: none;
        }

        .grid-trato {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 6px;
        }
        .btn-trato {
            background: var(--gris-suave);
            border: 2px solid transparent;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            color: var(--texto-oscuro);
            width: 100%;
            box-sizing: border-box;
            transition: background 0.18s, border-color 0.18s, color 0.18s, transform 140ms, box-shadow 140ms;
        }
        .btn-trato.active {
            border-color: var(--btn-dorado);
            background: #ffe5cb;
            color: var(--texto-oscuro);
        }
        .btn-trato:hover {
            transform: translateY(-8px);
            box-shadow: 0 6px 10px rgba(16,16,16,0.06);
        }

        /* GRID NIVEL IHG */
        .grid-nivel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 6px;
        }
        .btn-nivel {
            border: 2px solid transparent;
            padding: 11px 8px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            color: #ffffff;
            width: 100%;
            box-sizing: border-box;
            transition: border-color 0.18s, transform 140ms, box-shadow 140ms, opacity 140ms;
            opacity: 0.82;
        }
        .btn-nivel.active {
            border-color: rgba(255,255,255,0.6);
            opacity: 1;
            box-shadow: 0 4px 14px rgba(0,0,0,0.25);
        }
        .btn-nivel:hover {
            transform: translateY(-8px);
            box-shadow: 0 6px 10px rgba(16,16,16,0.15);
            opacity: 1;
        }
        .btn-nivel-diamond {
            grid-column: span 2;
        }

        .grid-idiomas {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-top: 6px;
        }
        .btn-lang {
            background: var(--gris-suave);
            border: 2px solid transparent;
            padding: 10px 6px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            color: var(--texto-oscuro);
            text-transform: uppercase;
            width: 100%;
            box-sizing: border-box;
            transition: background 0.18s, color 0.18s, border-color 0.18s, transform 140ms, box-shadow 140ms;
        }
        .btn-lang.active {
            background: var(--fondo-azul);
            color: white;
            border-color: var(--fondo-azul);
        }
        .btn-lang:not(.active):hover {
            transform: translateY(-8px);
            box-shadow: 0 6px 10px rgba(16,16,16,0.06);
        }
        .btn-lang[style] { text-align: center; }

        .side-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: stretch;
            justify-content: stretch;
            align-self: stretch;
            height: 100%;
            padding: 6px 0;
        }
        .side-actions .btn-action {
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            color: white;
            font-size: 15px;
            transition: transform 140ms, box-shadow 140ms;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            background: linear-gradient(180deg, var(--btn-dorado), #cf7a1f);
        }
        .side-actions .btn-action:hover { transform: translateY(-6px); box-shadow: 0 14px 30px rgba(16,16,16,0.12); }
        .side-actions .btn-action:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #status {
            margin-top: 10px;
            font-weight: bold;
            color: #2ecc71;
            height: 20px;
            padding-bottom: 15px;
            text-align: center;
            font-size: 14px;
        }

        @media (max-width: 520px) {
            .content-grid { grid-template-columns: 1fr; }
            .side-actions { flex-direction: row; gap: 8px; }
            .side-actions .btn-action { flex: 1; height: auto; }
        }
    </style>
</head>
<body>

<div class="bg-slider" aria-hidden="true">
    <div class="bg-slide" style="background-image: linear-gradient(rgba(33,43,99,0.6), rgba(20,26,60,0.8)), url('https://apiimg.iberostar.com/uploads/image/88306/image.jpeg');"></div>
    <div class="bg-slide" style="background-image: linear-gradient(rgba(33,43,99,0.6), rgba(20,26,60,0.8)), url('https://z.cdrst.com/foto/hotel-sf/132a2ed6/granderesp/foto-hotel-132a242c.jpg');"></div>
    <div class="bg-slide" style="background-image: linear-gradient(rgba(33,43,99,0.6), rgba(20,26,60,0.8)), url('https://digital.ihg.com/is/image/ihg/independent-riviera-maya-9034448709-2x1');"></div>
    <div class="bg-slide" style="background-image: linear-gradient(rgba(33,43,99,0.6), rgba(20,26,60,0.8)), url('https://digital.ihg.com/is/image/ihg/independent-riviera-maya-9034398519-4x3');"></div>
    <div class="bg-slide" style="background-image: linear-gradient(rgba(33,43,99,0.6), rgba(20,26,60,0.8)), url('https://z.cdrst.com/foto/hotel-sf/132a2eea/granderesp/foto-hotel-132a2440.jpg');"></div>
</div>

<div class="container">
    <div id="header-no-drag">
        <img src="https://assets4.cdn.iberostar.com/assets/star-72ad538f27d41b1d6bc65d4350faed1f19ddb66cb537e4b002a45f4d6803962a.png" class="logo-estrella" alt="estrella">
        <h2>IBEROSTAR WAVES</h2>
        <div class="subtitle">Paraíso Mar & Beach</div>
    </div>

    <div class="content-grid">
        <!-- IZQUIERDA: area reordenable -->
        <div id="reordenar-container">
            <!-- Apellido (primero) -->
            <div class="sort-item" draggable="true">
                <label>Apellido del Huésped</label>
                <input type="text" id="apellido" placeholder="Escriba o pegue..." autocomplete="off">
            </div>

            <!-- Género (segundo) -->
            <div class="sort-item" draggable="true">
                <label>Género</label>
                <div class="grid-trato">
                    <button class="btn-trato" id="btn-m" onclick="setTrato('m')">Mujer</button>
                    <button class="btn-trato active" id="btn-h" onclick="setTrato('h')">Hombre</button>
                </div>
            </div>

            <!-- Nivel IHG (tercero) -->
            <div class="sort-item" draggable="true">
                <label>Nivel IHG</label>
                <div class="grid-nivel">
                    <button class="btn-nivel active" id="btn-nivel-club" style="background-color:#6c8184;" onclick="setNivel('Club', this)">Club</button>
                    <button class="btn-nivel" id="btn-nivel-silver" style="background-color:#666666;" onclick="setNivel('Silver Elite', this)">Silver Elite</button>
                    <button class="btn-nivel" id="btn-nivel-gold" style="background-color:#a38b37;" onclick="setNivel('Gold Elite', this)">Gold Elite</button>
                    <button class="btn-nivel" id="btn-nivel-platinum" style="background-color:#b7b7b7;" onclick="setNivel('Platinum Elite', this)">Platinum Elite</button>
                    <button class="btn-nivel btn-nivel-diamond" id="btn-nivel-diamond" style="background-color:#072d33;" onclick="setNivel('Diamond Elite', this)">Diamond Elite</button>
                </div>
            </div>

            <!-- Idiomas (cuarto) -->
            <div class="sort-item" draggable="true">
                <label>Seleccionar Idioma</label>
                <div class="grid-idiomas">
                    <button class="btn-lang active" onclick="setLang('es', this)">ESPAÑOL</button>
                    <button class="btn-lang" onclick="setLang('en', this)">INGLÉS</button>
                    <button class="btn-lang" onclick="setLang('fr', this)">FRANCÉS</button>
                    <button class="btn-lang" onclick="setLang('pt', this)">PORTUGUÊS</button>
                    <button class="btn-lang" onclick="setLang('it', this)">ITALIANO</button>
                    <button class="btn-lang" onclick="setLang('de', this)">ALEMÁN</button>
                    <button class="btn-lang" style="grid-column: span 3;" onclick="setLang('zh', this)">CHINO</button>
                </div>
            </div>

            <div id="status"></div>
        </div>

        <!-- DERECHA: botón largo "MAR & BEACH" -->
        <div class="side-actions" aria-hidden="false">
            <button class="btn-action" id="btn-copiar" onclick="copiar()">MAR & BEACH</button>
        </div>
    </div>
</div>

<script>
    // Slider
    (function() {
        const slides = Array.from(document.querySelectorAll('.bg-slide'));
        if (!slides.length) return;
        slides.forEach((s, i) => { if (i === 0) s.classList.add('active'); });
        slides.forEach(s => {
            const m = (s.style.backgroundImage || '').match(/url\(['"]?(.*?)['"]?\)/);
            if (m && m[1]) { const img = new Image(); img.src = m[1]; }
        });
        let idx = slides.findIndex(s => s.classList.contains('active'));
        if (idx < 0) idx = 0;
        setInterval(() => {
            slides[idx].classList.remove('active');
            idx = (idx + 1) % slides.length;
            slides[idx].classList.add('active');
        }, 15000);
    })();

    // Sortable
    const reordenarArea = document.getElementById('reordenar-container');
    Sortable.create(reordenarArea, {
        animation: 200,
        easing: 'cubic-bezier(0.2,0.8,0.2,1)',
        ghostClass: 'sortable-ghost',
        filter: 'input, button, label',
        preventOnFilter: false
    });

    // Estado
    let currentLang = 'es';
    let currentTrato = 'h';
    let currentNivel = 'Club';

    const saludos = {
        es: { h: "Estimado Sr.", m: "Estimada Sra." },
        en: { h: "Dear Mr.", m: "Dear Mrs." },
        de: { h: "Sehr geehrter Herr", m: "Sehr geehrte Frau" },
        fr: { h: "Cher M.", m: "Chère Mme" },
        pt: { h: "Prezado Sr.", m: "Prezada Sra." },
        it: { h: "Gentile Sig.", m: "Gentile Sig.ra" },
        zh: { h: "尊敬的先生", m: "尊敬的女士" }
    };

    let mensajes = {
        es: "{saludo} {a},\n\nTal como comentamos durante su check-in, en Iberostar Waves Paraíso del Mar & Beach queremos agradecerle nuevamente su lealtad como miembro {nivel} de IHG One Rewards. Nos da mucho gusto recibirle y que nos haya elegido para su estancia.\n\nEsperamos que disfrute cada momento con nosotros y que tenga una experiencia muy especial.\n\nPara cualquier asistencia durante su estancia, con gusto estamos a su disposición en las extensiones 8232, 8214 o 8113.\n\nSaludos cordiales,\nEquipo de Recepción",
        en: "{saludo} {a},\n\nAs we mentioned during your check-in, at Iberostar Waves Paraíso del Mar & Beach we would like to thank you once again for your loyalty as a {nivel} member of IHG One Rewards. It is our pleasure to welcome you, and we truly appreciate you choosing us for your stay.\n\nWe hope you enjoy every moment with us and that your stay is a memorable one.\n\nFor any assistance during your stay, please feel free to contact us at extensions 8232, 8214, or 8113.\n\nKind regards,\nFront Desk Team",
        de: "{saludo} {a},\n\nwie wir während Ihres Check-ins erwähnt haben, möchten wir Ihnen im Iberostar Waves Paraíso del Mar & Beach erneut für Ihre Treue als {nivel}-Mitglied von IHG One Rewards danken. Es ist uns eine Freude, Sie willkommen zu heißen, und wir schätzen es sehr, dass Sie sich für uns entschieden haben.\n\nWir hoffen, dass Sie jeden Moment bei uns genießen und Ihren Aufenthalt unvergesslich finden.\n\nFür jede Unterstützung während Ihres Aufenthalts stehen wir Ihnen gerne unter den Durchwahlen 8232, 8214 oder 8113 zur Verfügung.\n\nMit freundlichen Grüßen,\nEmpfangsteam",
        fr: "{saludo} {a},\n\nComme nous vous l'avons mentionné lors de votre check-in, à l'Iberostar Waves Paraíso del Mar & Beach nous souhaitons vous remercier à nouveau pour votre fidélité en tant que membre {nivel} d'IHG One Rewards. C'est un plaisir de vous accueillir et nous apprécions vraiment que vous nous ayez choisis pour votre séjour.\n\nNous espérons que vous profiterez de chaque instant avec nous et que votre séjour sera mémorable.\n\nPour toute assistance durant votre séjour, nous sommes à votre disposition aux extensions 8232, 8214 ou 8113.\n\nCordialement,\nL'équipe de Réception",
        pt: "{saludo} {a},\n\nComo mencionamos durante o seu check-in, no Iberostar Waves Paraíso do Mar & Beach gostaríamos de agradecê-lo novamente pela sua lealdade como membro {nivel} do IHG One Rewards. É um prazer recebê-lo e agradecemos muito por ter nos escolhido para sua estadia.\n\nEsperamos que aproveite cada momento conosco e que sua estadia seja inesquecível.\n\nPara qualquer assistência durante sua estadia, estamos à sua disposição nos ramais 8232, 8214 ou 8113.\n\nAtenciosamente,\nEquipe de Recepção",
        it: "{saludo} {a},\n\nCome le abbiamo menzionato durante il check-in, all'Iberostar Waves Paraíso del Mar & Beach desideriamo ringraziarla nuovamente per la sua fedeltà come membro {nivel} di IHG One Rewards. È un piacere darle il benvenuto e apprezziamo molto che abbia scelto noi per il suo soggiorno.\n\nSperiamo che possa godere di ogni momento con noi e che il suo soggiorno sia indimenticabile.\n\nPer qualsiasi assistenza durante il soggiorno, siamo a sua disposizione agli interni 8232, 8214 o 8113.\n\nCordiali saluti,\nTeam di Ricevimento",
        zh: "{saludo} {a}，\n\n正如我们在您办理入住手续时所提到的，Iberostar Waves Paraíso del Mar & Beach 衷心感谢您作为 IHG One Rewards {nivel} 会员的忠诚支持。很高兴欢迎您的到来，感谢您选择我们作为您的住宿地点。\n\n希望您享受与我们在一起的每一刻，并留下美好的回忆。\n\n如在住宿期间需要任何协助，请随时拨打分机 8232、8214 或 8113 与我们联系。\n\n顺致嘉德，\n前台团队"
    };

    // ─── Cargar mensajes desde Sheets al iniciar ──────────────────────────────
    (function cargarMensajesDesdeSheets() {
        try {
            if (typeof google !== 'undefined' && google.script && google.script.run) {
                document.getElementById('btn-copiar').disabled = true;
                document.getElementById('status').innerText = 'Cargando...';
                google.script.run
                    .withSuccessHandler(function(data) {
                        if (data && typeof data === 'object' && data.es) {
                            mensajes = data;
                        }
                        document.getElementById('btn-copiar').disabled = false;
                        document.getElementById('status').innerText = '';
                    })
                    .withFailureHandler(function(err) {
                        console.warn('Usando mensajes predeterminados.', err);
                        document.getElementById('btn-copiar').disabled = false;
                        document.getElementById('status').innerText = '';
                    })
                    .getMensajesWaves();
            }
        } catch(e) {
            console.warn('google.script.run no disponible:', e);
        }
    })();

    function setLang(lang, btn) {
        currentLang = lang;
        document.querySelectorAll('.btn-lang').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
    }

    function setTrato(trato) {
        currentTrato = trato;
        const elH = document.getElementById('btn-h');
        const elM = document.getElementById('btn-m');
        if (elH) elH.classList.remove('active');
        if (elM) elM.classList.remove('active');
        const target = trato === 'h' ? elH : elM;
        if (target) target.classList.add('active');
    }

    function setNivel(nivel, btn) {
        currentNivel = nivel;
        document.querySelectorAll('.btn-nivel').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
    }

    function corregirNombre(texto) {
        if (!texto) return "Huésped";
        let limpio = texto.trim().replace(/\s+/g, ' ');
        return limpio.toLowerCase().split(' ').map(p => p.charAt(0).toUpperCase() + p.slice(1)).join(' ');
    }

    function copiar() {
        const inputNom = document.getElementById('apellido').value;
        const apellido = corregirNombre(inputNom);
        const saludoFinal = saludos[currentLang][currentTrato];

        let base = mensajes[currentLang];
        let final = base
            .replace(/\{\{apellido\}\}/g, apellido)
            .replace(/\{\{nivel\}\}/g,    currentNivel)
            .replace(/{saludo}/g,         saludoFinal)
            .replace(/{a}/g,              apellido)
            .replace(/{nivel}/g,          currentNivel);

        navigator.clipboard.writeText(final).then(() => {
            const st = document.getElementById('status');
            st.innerText = "¡COPIADO!";
            setTimeout(() => {
                st.innerText = "";
                limpiar();
            }, 1200);
        }).catch(() => {
            const st = document.getElementById('status');
            st.innerText = "Error al copiar";
            setTimeout(() => { st.innerText = ""; }, 1500);
        });
    }

    function limpiar() {
        document.getElementById('apellido').value = "";
        document.getElementById('apellido').focus();
    }
</script>

</body>
</html>
